# Kubernetes Secret manifest — INTENTIONALLY DIRTY.
# Real-looking `stringData` so the secret scanner finds these in chat
# requests that @-reference the file. Values are public AWS example
# strings, never real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-secrets
  namespace: demo
type: Opaque
stringData:
  # AKIA… value uses high-entropy suffix (no EXAMPLE tail) so
  # trufflehog's built-in aws-access-token detector fires.
  AWS_ACCESS_KEY_ID: AKIAIOSFODNN7ABCDEFGH
  AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMIK7MDENGbPxRfiCYABCDEFGHIJ
  # High-entropy ghp_ suffix for the Github detector.
  GITHUB_TOKEN: ghp_M7p9Lq3RtV34X7K2H8Q5N1B6J0Z9D4Y7S2P8
  DATABASE_URL: postgres://demo:demo@db.demo.svc.cluster.local:5432/demo
  # Slack webhook URL (https://hooks.slack.com/services/.../...) is
  # matched by the `slack-webhook-url` rule.
  SLACK_WEBHOOK_URL: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
---
# Clean ConfigMap — no secrets, demonstrates the scanner is selective.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: demo
data:
  LOG_LEVEL: info
  FEATURE_FLAG_NEW_UI: "true"
  PUBLIC_BASE_URL: https://demo.example.com
  MAX_CONNECTIONS: "100"
